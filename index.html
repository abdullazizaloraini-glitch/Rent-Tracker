<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="سجل التحصيل">
<meta name="theme-color" content="#0E5A48">
<title>سجل التحصيل العقاري</title>
<style>
*{box-sizing:border-box;margin:0}
:root{--bg:#F3F5F2;--paper:#FFF;--ink:#17221E;--mut:#5B6663;--line:#DEE4E0;--green:#0E5A48;--green2:#0B463A;--gold:#9A6A0B;--red:#A8362C;--wa:#1FAF54}
body{font-family:-apple-system,'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--ink);direction:rtl}
.num{font-variant-numeric:tabular-nums}
header{background:var(--green);color:#fff;padding:max(14px,env(safe-area-inset-top)) 20px 12px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
header h1{font-size:19px;font-weight:800;letter-spacing:.2px}
header .sub{font-size:12px;opacity:.85}
nav{display:flex;gap:4px;background:var(--green2);padding:6px 14px;overflow-x:auto;position:sticky;top:0;z-index:10}
nav button{border:0;background:transparent;color:#CFE3DC;padding:9px 14px;border-radius:9px;font:inherit;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap}
nav button.on{background:#fff;color:var(--green2)}
main{max-width:1080px;margin:0 auto;padding:18px 14px 80px}
.card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:16px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:14px}
.kpi .t{font-size:12px;color:var(--mut);font-weight:700}
.kpi .v{font-size:22px;font-weight:800;margin-top:4px}
.kpi .u{font-size:11px;color:var(--mut)}
.sec{font-size:15px;font-weight:800;margin:18px 0 8px;display:flex;align-items:center;gap:8px}
.sec::after{content:"";flex:1;height:1px;background:var(--line)}
.chip{display:inline-block;padding:2px 10px;border-radius:99px;font-size:11.5px;font-weight:800}
.btn{border:0;border-radius:10px;padding:9px 16px;font:inherit;font-size:13.5px;font-weight:800;cursor:pointer;background:var(--green);color:#fff;text-decoration:none;display:inline-block}
.btn.sec2{background:#E8EDE9;color:var(--green2)}
.btn.dng{background:#F9E5E2;color:var(--red)}
.btn.wa{background:var(--wa);color:#fff}
.btn.sm{padding:6px 11px;font-size:12.5px;border-radius:8px}
.btn.ic{padding:6px 9px;font-size:13px;border-radius:8px}
.in{width:100%;border:1px solid var(--line);border-radius:10px;padding:9px 11px;font:inherit;font-size:13.5px;background:#fff;color:var(--ink)}
.in:focus{outline:2px solid var(--green);border-color:var(--green)}
.lbl{font-size:12px;font-weight:800;color:var(--mut);display:block;margin:0 0 4px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px}
.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ribbon{display:flex;gap:3px;height:10px;border-radius:6px;overflow:hidden;flex:1;min-width:110px}
.ribbon i{display:block;height:100%;min-width:6px;border-radius:3px}
.clist .item{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--line);cursor:pointer;flex-wrap:wrap}
.clist .item:active{background:#F2F7F4}
.clist .item:last-child{border-bottom:0}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:right;color:var(--mut);font-size:11.5px;padding:7px 8px;border-bottom:1px solid var(--line)}
.tbl td{padding:8px;border-bottom:1px solid #EDF0EE}
.modal-bg{position:fixed;inset:0;background:rgba(15,30,25,.45);display:flex;align-items:flex-start;justify-content:center;padding:24px 12px;z-index:50;overflow:auto}
.modal{background:#fff;border-radius:16px;max-width:680px;width:100%;padding:20px;margin-bottom:40px}
.modal h3{font-size:16px;font-weight:800;margin-bottom:14px}
.empty{text-align:center;padding:46px 16px;color:var(--mut)}
.empty b{display:block;font-size:16px;color:var(--ink);margin-bottom:6px}
.pbar{height:7px;background:#E8EDE9;border-radius:5px;overflow:hidden}
.pbar i{display:block;height:100%;background:var(--green)}
.tag{font-size:11px;font-weight:800;color:var(--mut);background:#EDF0EE;border-radius:6px;padding:2px 8px}
.banner{background:#F8EED7;border:1px solid #E8D8AF;color:#7A4A0B;border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;font-size:13px;font-weight:700}
.chartwrap{display:flex;gap:5px;align-items:flex-end;padding:10px 2px 0;overflow-x:auto}
.cmonth{flex:1;min-width:34px;display:flex;flex-direction:column;align-items:center;gap:4px}
.cbars{display:flex;gap:3px;align-items:flex-end;height:110px;width:100%;justify-content:center}
.cbars i{display:block;width:44%;max-width:16px;border-radius:4px 4px 0 0;min-height:2px}
.clabel{font-size:10px;color:var(--mut)}
.dot{display:inline-block;width:10px;height:10px;border-radius:3px;margin-left:4px;vertical-align:-1px}
.note-item{display:flex;gap:8px;align-items:flex-start;padding:8px 0;border-bottom:1px solid #EDF0EE;font-size:13px}
.guide p{font-size:13.5px;line-height:1.9;color:#2A3530;margin-top:4px}
textarea.in{font-family:ui-monospace,monospace;font-size:12px;direction:ltr;text-align:right}
@media(max-width:640px){.grid2{grid-template-columns:1fr}.kpi .v{font-size:18px}}
@media print{nav,header,.btn{display:none!important}}
</style>
</head>
<body>
<div id="app"></div>
<div id="modal"></div>
<script>
/* ============ Helpers ============ */
var KEY='rent-tracker-v1';
function uid(){return Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4)}
function todayISO(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function fmtM(n){return new Intl.NumberFormat('en-US',{maximumFractionDigits:0}).format(Math.round(n||0))}
function fmtD(s){if(!s)return'—';var p=s.split('-');return p[2]+'/'+p[1]+'/'+p[0]}
function addMonths(iso,n){var p=iso.split('-').map(Number);var dt=new Date(Date.UTC(p[0],p[1]-1+n,1));var last=new Date(Date.UTC(dt.getUTCFullYear(),dt.getUTCMonth()+1,0)).getUTCDate();dt.setUTCDate(Math.min(p[2],last));return dt.toISOString().slice(0,10)}
function daysBetween(a,b){return Math.round((new Date(b)-new Date(a))/86400000)}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function parseDateLoose(s){if(!s)return null;s=String(s).trim();var m=s.match(/^(\d{4})[-\/.](\d{1,2})[-\/.](\d{1,2})/);if(m)return m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0');m=s.match(/^(\d{1,2})[-\/.](\d{1,2})[-\/.](\d{4})/);if(m)return m[3]+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0');return null}
function parseAmt(s){if(s==null)return null;var t=String(s).replace(/[,٬\s]/g,'').replace(/ر\.?س|SAR|ريال/gi,'');if(!/^-?\d*\.?\d+$/.test(t))return null;var n=parseFloat(t);return isNaN(n)?null:n}
function waNum(phone){var d=String(phone||'').replace(/\D/g,'');if(d.indexOf('00')===0)d=d.slice(2);if(d.indexOf('966')===0)return d;if(d.indexOf('05')===0&&d.length===10)return '966'+d.slice(1);if(d.indexOf('5')===0&&d.length===9)return '966'+d;return d}
function waLink(phone,msg){return 'https://wa.me/'+waNum(phone)+(msg?'?text='+encodeURIComponent(msg):'')}
function monthKey(iso){return iso.slice(0,7)}

var FREQS=[{id:'monthly',label:'شهري',m:1},{id:'quarterly',label:'ربع سنوي',m:3},{id:'semi',label:'نصف سنوي',m:6},{id:'annual',label:'سنوي',m:12}];
var CHANNELS=['إيجار','تحويل بنكي','نقدي','شيك'];
var STATUS={paid:{label:'مسدد',c:'#0F6E52',bg:'#E2F2EB'},partial:{label:'سداد جزئي',c:'#9A6A0B',bg:'#F8EED7'},overdue:{label:'متأخر',c:'#A8362C',bg:'#F9E5E2'},upcoming:{label:'قادم',c:'#5B6663',bg:'#EDF0EE'}};

/* ============ State ============ */
var S={properties:[],units:[],contracts:[],payments:[],meta:{lastBackup:null}};
var UI={view:'dash',q:'',prop:'',status:'',sort:'arrears',modal:null,draft:[],imp:null,bank:null};

function load(){
  try{var r=localStorage.getItem(KEY);if(r)S=JSON.parse(r)}catch(e){}
  if(!S.meta)S.meta={lastBackup:null};
  if(!S.payments)S.payments=[];
  (S.contracts||[]).forEach(function(c){if(c.archived===undefined)c.archived=false;if(!c.notes)c.notes=[]});
}
function save(){try{localStorage.setItem(KEY,JSON.stringify(S))}catch(e){alert('تعذر حفظ البيانات — قد تكون مساحة المتصفح ممتلئة أو وضع التصفح الخاص مفعّلاً.')}}
function activeContracts(){return S.contracts.filter(function(c){return !c.archived})}

/* ============ Compute ============ */
function computeContract(c){
  var pays=S.payments.filter(function(p){return p.contractId===c.id}).sort(function(a,b){return a.date<b.date?-1:1});
  var totalPaid=pays.reduce(function(s,p){return s+p.amount},0);
  var pool=totalPaid,t=todayISO();
  var inst=(c.installments||[]).slice().sort(function(a,b){return a.due<b.due?-1:1}).map(function(i){
    var paid=Math.min(pool,i.amount);pool-=paid;
    var st; if(paid>=i.amount-0.01)st='paid'; else if(i.due<=t)st=paid>0?'partial':'overdue'; else st='upcoming';
    return {id:i.id,due:i.due,amount:i.amount,paid:paid,remaining:Math.max(0,i.amount-paid),status:st};
  });
  var totalRent=inst.reduce(function(s,i){return s+i.amount},0);
  var arrears=inst.filter(function(i){return i.due<=t}).reduce(function(s,i){return s+i.remaining},0);
  var next=null;for(var k=0;k<inst.length;k++){if(inst[k].status!=='paid'){next=inst[k];break}}
  var dueSoon=inst.filter(function(i){return i.status==='upcoming'&&daysBetween(t,i.due)<=30});
  return {inst:inst,pays:pays,totalPaid:totalPaid,totalRent:totalRent,arrears:arrears,next:next,dueSoon:dueSoon,credit:pool,expired:c.end&&c.end<t};
}
function unitName(id){var u=S.units.find(function(x){return x.id===id});var p=u&&S.properties.find(function(x){return x.id===u.propertyId});return u?((p?p.name:'')+' — '+u.name):'—'}
function reminderText(c,comp){
  var u=unitName(c.unitId);
  var L=['السلام عليكم '+c.tenant+'،'];
  if(comp.arrears>0.01){L.push('نذكّركم بالمستحقات المتأخرة لوحدة ('+u+'):');L.push('المبلغ المتأخر: '+fmtM(comp.arrears)+' ر.س');}
  else if(comp.next){L.push('تذكير بالقسط القادم لوحدة ('+u+'):');L.push('المبلغ: '+fmtM(comp.next.remaining)+' ر.س');L.push('تاريخ الاستحقاق: '+fmtD(comp.next.due));}
  else{L.push('نشكر لكم التزامكم بسداد إيجار وحدة ('+u+').');}
  L.push('وشكراً لتعاونكم.');
  return L.join('\n');
}
function contactBtns(c,withReminder){
  if(!c.phone)return '';
  var h='<a class="btn sec2 ic" onclick="event.stopPropagation()" href="tel:+'+waNum(c.phone)+'" title="اتصال">📞</a>'+
        '<a class="btn wa ic" onclick="event.stopPropagation()" target="_blank" rel="noopener" href="'+waLink(c.phone)+'" title="واتساب">💬</a>';
  if(withReminder){
    var comp=computeContract(c);
    h+='<a class="btn wa sm" onclick="event.stopPropagation()" target="_blank" rel="noopener" href="'+waLink(c.phone,reminderText(c,comp))+'">تذكير واتساب</a>';
  }
  return h;
}

/* ============ Render pieces ============ */
function ribbonHTML(inst){
  return '<div class="ribbon">'+inst.map(function(i){
    var col=i.status==='paid'?'#0F6E52':i.status==='partial'?'#D9A437':i.status==='overdue'?'#C2483D':'#CBD4CF';
    return '<i style="flex:'+i.amount+';background:'+col+'" title="'+fmtD(i.due)+' — '+fmtM(i.amount)+' ر.س — '+STATUS[i.status].label+'"></i>';
  }).join('')+'</div>';
}
function chipHTML(s){return '<span class="chip" style="color:'+STATUS[s].c+';background:'+STATUS[s].bg+'">'+STATUS[s].label+'</span>'}
function kpi(t,v,u,color){return '<div class="card kpi"><div class="t">'+t+'</div><div class="v num"'+(color?' style="color:'+color+'"':'')+'>'+v+'</div><div class="u num">'+u+'</div></div>'}

/* ============ Main render ============ */
function renderApp(){
  var comp=activeContracts().map(function(c){return Object.assign({c:c},computeContract(c))});
  var tot={rent:0,paid:0,arr:0,due30:0,odc:0};
  comp.forEach(function(x){tot.rent+=x.totalRent;tot.paid+=Math.min(x.totalPaid,x.totalRent);tot.arr+=x.arrears;tot.due30+=x.dueSoon.reduce(function(s,i){return s+i.amount},0);if(x.arrears>0.01)tot.odc++});
  var empty=!S.properties.length&&!S.contracts.length;

  var h='<header><div><h1>سجل التحصيل العقاري</h1><div class="sub num">'+S.properties.length+' عقار · '+S.units.length+' وحدة · '+activeContracts().length+' عقد نشط</div></div></header>';
  h+='<nav>'+[['dash','لوحة المتابعة'],['contracts','العقود'],['props','العقارات'],['reports','التقارير'],['import','الاستيراد والنسخ'],['guide','الدليل']].map(function(t){
    return '<button class="'+(UI.view===t[0]?'on':'')+'" onclick="A.nav(\''+t[0]+'\')">'+t[1]+'</button>';
  }).join('')+'</nav><main>';

  if(empty&&UI.view!=='import'&&UI.view!=='guide'){
    h+='<div class="card empty"><b>ابدأ بإضافة بياناتك</b>أضف عقاراتك ووحداتك وعقودك يدوياً، أو الصق بياناتك من منصة إيجار في صفحة الاستيراد.'+
       '<div class="row" style="justify-content:center;margin-top:16px"><button class="btn" onclick="A.openForm()">إضافة عقد</button>'+
       '<button class="btn sec2" onclick="A.nav(\'import\')">الاستيراد من إيجار</button>'+
       '<button class="btn sec2" onclick="A.demo()">تجربة ببيانات توضيحية</button></div></div>';
  }
  else if(UI.view==='dash')h+=dashHTML(comp,tot);
  else if(UI.view==='contracts')h+=contractsHTML();
  else if(UI.view==='props')h+=propsHTML();
  else if(UI.view==='reports')h+=reportsHTML(comp);
  else if(UI.view==='import')h+=importHTML();
  else if(UI.view==='guide')h+=guideHTML();

  h+='</main>';
  document.getElementById('app').innerHTML=h;
  if(UI.view==='contracts')renderCList();
}

/* ============ Dashboard ============ */
function dashHTML(comp,tot){
  var t=todayISO(),h='';
  if(activeContracts().length&&(!S.meta.lastBackup||daysBetween(S.meta.lastBackup,t)>30)){
    h+='<div class="banner">⚠️ '+(S.meta.lastBackup?'مرّ أكثر من ٣٠ يوماً على آخر نسخة احتياطية.':'لم تُصدّر أي نسخة احتياطية بعد — بياناتك محفوظة في هذا الجهاز فقط.')+
       '<button class="btn sm" onclick="A.nav(\'import\')">تصدير نسخة الآن</button></div>';
  }
  h+='<div class="kpis">'+kpi('إجمالي قيمة العقود',fmtM(tot.rent),'ر.س')+
     kpi('المحصل',fmtM(tot.paid),'ر.س — '+(tot.rent?Math.round(tot.paid/tot.rent*100):0)+'٪','#0F6E52')+
     kpi('المتأخرات المتراكمة',fmtM(tot.arr),'ر.س — '+tot.odc+' عقد',tot.arr>0?'#A8362C':'#0F6E52')+
     kpi('مستحق خلال ٣٠ يوماً',fmtM(tot.due30),'ر.س','#9A6A0B')+'</div>';

  h+='<div class="sec">المتأخرات — الأعلى أولاً</div><div class="card clist" style="padding:0">';
  var od=comp.filter(function(x){return x.arrears>0.01}).sort(function(a,b){return b.arrears-a.arrears}).slice(0,20);
  if(od.length){h+=od.map(function(x){
    return '<div class="item" onclick="A.openDetail(\''+x.c.id+'\')"><div style="min-width:150px"><div style="font-weight:800;font-size:14px">'+esc(x.c.tenant)+'</div>'+
      '<div style="font-size:12px;color:var(--mut)">'+esc(unitName(x.c.unitId))+'</div></div>'+contactBtns(x.c,false)+ribbonHTML(x.inst)+
      '<div class="num" style="font-weight:800;color:#A8362C;min-width:85px;text-align:left">'+fmtM(x.arrears)+' ر.س</div></div>';
  }).join('')}else h+='<div class="empty" style="padding:24px">لا توجد متأخرات — جميع الأقساط المستحقة مسددة ✓</div>';
  h+='</div>';

  h+='<div class="sec">أقساط قادمة خلال ٣٠ يوماً</div><div class="card clist" style="padding:0">';
  var ds=[];comp.forEach(function(x){x.dueSoon.forEach(function(i){ds.push({x:x,i:i})})});
  ds.sort(function(a,b){return a.i.due<b.i.due?-1:1});
  if(ds.length){h+=ds.slice(0,20).map(function(o){
    return '<div class="item" onclick="A.openDetail(\''+o.x.c.id+'\')"><div style="min-width:150px"><div style="font-weight:800;font-size:14px">'+esc(o.x.c.tenant)+'</div>'+
      '<div style="font-size:12px;color:var(--mut)">'+esc(unitName(o.x.c.unitId))+'</div></div>'+
      '<span class="tag num">'+fmtD(o.i.due)+'</span><span class="tag">'+esc(o.x.c.channel)+'</span>'+
      '<div class="num" style="font-weight:800;min-width:85px;text-align:left">'+fmtM(o.i.amount)+' ر.س</div></div>';
  }).join('')}else h+='<div class="empty" style="padding:24px">لا توجد استحقاقات خلال ٣٠ يوماً القادمة</div>';
  h+='</div>';

  var exp=activeContracts().filter(function(c){return c.end>=t&&daysBetween(t,c.end)<=90}).sort(function(a,b){return a.end<b.end?-1:1});
  h+='<div class="sec">عقود تنتهي خلال ٩٠ يوماً</div><div class="card clist" style="padding:0">';
  if(exp.length){h+=exp.map(function(c){
    var d=daysBetween(t,c.end);
    return '<div class="item" onclick="A.openDetail(\''+c.id+'\')"><div style="min-width:150px"><div style="font-weight:800;font-size:14px">'+esc(c.tenant)+'</div>'+
      '<div style="font-size:12px;color:var(--mut)">'+esc(unitName(c.unitId))+'</div></div>'+contactBtns(c,false)+
      '<span class="tag num">ينتهي '+fmtD(c.end)+'</span>'+
      '<span class="chip num" style="color:'+(d<=30?'#A8362C':'#9A6A0B')+';background:'+(d<=30?'#F9E5E2':'#F8EED7')+'">بعد '+d+' يوم</span></div>';
  }).join('')}else h+='<div class="empty" style="padding:24px">لا توجد عقود تنتهي خلال ٩٠ يوماً القادمة</div>';
  h+='</div>';
  return h;
}

/* ============ Contracts ============ */
function contractsHTML(){
  return '<div class="row" style="margin-bottom:12px">'+
    '<input class="in" style="flex:2;min-width:150px" placeholder="بحث: مستأجر / وحدة / رقم عقد" value="'+esc(UI.q)+'" oninput="A.setQ(this.value)">'+
    '<select class="in" style="flex:1;min-width:120px" onchange="A.setProp(this.value)"><option value="">كل العقارات</option>'+
    S.properties.map(function(p){return '<option value="'+p.id+'"'+(UI.prop===p.id?' selected':'')+'>'+esc(p.name)+'</option>'}).join('')+'</select>'+
    '<select class="in" style="flex:1;min-width:120px" onchange="A.setStatus(this.value)"><option value="">كل الحالات</option>'+
    '<option value="overdue"'+(UI.status==='overdue'?' selected':'')+'>عليه متأخرات</option>'+
    '<option value="due30"'+(UI.status==='due30'?' selected':'')+'>مستحق خلال ٣٠ يوم</option>'+
    '<option value="paid"'+(UI.status==='paid'?' selected':'')+'>مسدد بالكامل</option>'+
    '<option value="archived"'+(UI.status==='archived'?' selected':'')+'>المؤرشفة</option></select>'+
    '<select class="in" style="flex:1;min-width:130px" onchange="A.setSort(this.value)">'+
    '<option value="arrears"'+(UI.sort==='arrears'?' selected':'')+'>الأعلى متأخرات</option>'+
    '<option value="due"'+(UI.sort==='due'?' selected':'')+'>الاستحقاق الأقرب</option>'+
    '<option value="amount"'+(UI.sort==='amount'?' selected':'')+'>قيمة العقد الأعلى</option>'+

    tot.u+=units.length;tot.o+=o;tot.v+=units.length-o;tot.val+=val;tot.paid+=paid;tot.arr+=arr;

  h+='<div class="sec">الوحدات الشاغرة <span class="tag num">'+vac.length+'</span></div><div class="card">';

var COLS=[{id:'skip',label:'تجاهل'},{id:'tenant',label:'المستأجر'},{id:'ejarRef',label:'رقم العقد'},{id:'property',label:'العقار'},{id:'unit',label:'الوحدة'},{id:'start',label:'تاريخ البداية'},{id:'end',label:'تاريخ النهاية'},{id:'total',label:'قيمة العقد'},{id:'phone',label:'الجوال'}];
function guessCol(vals){
  var v=vals.filter(Boolean).map(String);if(!v.length)return 'skip';
  if(v.every(function(x){return parseDateLoose(x)}))return 'start';
  if(v.every(function(x){var d=x.replace(/\D/g,'');return d.length>=9&&d.length<=12&&/^05/.test(d)}))return 'phone';
  if(v.every(function(x){return /^\d{9,}$/.test(x.replace(/\s/g,''))}))return 'ejarRef';
  if(v.every(function(x){var n=parseAmt(x);return n!==null&&n>500&&n<100000000}))return 'total';
  if(v.some(function(x){return /[\u0600-\u06FF]{3,}\s+[\u0600-\u06FF]{2,}/.test(x)}))return 'tenant';
  return 'skip';
}
function dedupeMap(map){
  var seenT=0,seenTotal=-1,seen={};
  map.forEach(function(x,i){if(x==='total')seenTotal=i});
  return map.map(function(x,i){
    if(x==='total')return i===seenTotal?'total':'skip';
    if(x==='tenant'){seenT++;return seenT===1?'tenant':seenT===2?'property':seenT===3?'unit':'skip'}
    if(x==='start'||x==='end'||x==='skip')return x;
    if(seen[x])return 'skip';seen[x]=1;return x;
  });
}
function splitRows(text){
  var lines=text.split(/\r?\n/).map(function(l){return l.trim()}).filter(Boolean);
  if(!lines.length)return null;
  var delim=lines[0].indexOf('\t')>=0?'\t':lines[0].indexOf(';')>=0?';':lines[0].indexOf(',')>=0?',':null;
  var parsed=lines.map(function(l){return (delim?l.split(delim):l.split(/\s{2,}/)).map(function(x){return x.trim()})});
  var nCols=Math.max.apply(null,parsed.map(function(r){return r.length}));
  parsed=parsed.map(function(r){while(r.length<nCols)r.push('');return r});
  return parsed;
}

/* --- Bank matching (6) --- */
var BCOLS=[{id:'skip',label:'تجاهل'},{id:'date',label:'التاريخ'},{id:'amount',label:'المبلغ'},{id:'desc',label:'البيان'}];
function suggestContract(amount,desc){
  var best='',bestScore=0;
  var cands=activeContracts();
  cands.forEach(function(c){
    var score=0;
    var toks=c.tenant.split(/\s+/).filter(function(x){return x.length>=3});
    var hits=toks.filter(function(x){return desc.indexOf(x)>=0}).length;
    if(hits>=2)score+=10+hits;else if(hits===1&&toks.length===1)score+=10;
    var k=computeContract(c);
    if(amount>0&&(Math.abs(k.arrears-amount)<=1||k.inst.some(function(i){return i.remaining>0&&Math.abs(i.remaining-amount)<=1})))score+=4;
    if(score>bestScore){bestScore=score;best=c.id}
  });
  if(bestScore>=10)return best;
  var m=cands.filter(function(c){var k=computeContract(c);return amount>0&&(Math.abs(k.arrears-amount)<=1||k.inst.some(function(i){return i.remaining>0&&Math.abs(i.remaining-amount)<=1}))});
  return m.length===1?m[0].id:'';
}
function renderBankPrev(){

/* ============ Guide (دليل الاستخدام) ============ */
function guideHTML(){
  function g(t,b){return '<div class="card guide" style="margin-bottom:12px"><div style="font-weight:800;font-size:14.5px">'+t+'</div><p>'+b+'</p></div>'}
  return '<div class="sec" style="margin-top:0">دليل الاستخدام</div>'+
  g('١ — البداية','أضف عقاراتك من صفحة «العقارات»، ثم أضف وحدات كل عقار دفعة واحدة بفصل الأسماء بفاصلة (101, 102, 103). أو وفّر الوقت واستورد كل شيء من إيجار كما في الفقرة ٥. وللتجربة قبل البدء استخدم زر «تجربة ببيانات توضيحية» الظاهر عندما يكون التطبيق فارغاً.')+
  g('٢ — إضافة عقد وتوليد الأقساط','من «العقود» اضغط «+ عقد جديد»، اختر العقار والوحدة (أو أنشئهما من نفس النافذة)، وأدخل قيمة العقد كاملة ومدته، ثم اختر الجدولة (شهري/ربع/نصف/سنوي) واضغط «توليد جدول الأقساط». تستطيع تعديل تاريخ أو مبلغ أي قسط يدوياً قبل الحفظ.')+
  g('٣ — تسجيل الدفعات والمتأخرات','افتح أي عقد وسجّل الدفعة بمبلغها وقناتها (إيجار / تحويل بنكي / نقدي / شيك). أي دفعة تُخصم تلقائياً من أقدم الأقساط أولاً، فلو دفع المستأجر جزءاً من القسط يظهر «سداد جزئي» ويتراكم الباقي في «المتأخرات». زر «تعبئة قيمة القسط الحالي» يكتب لك المبلغ المتبقي جاهزاً.')+
  g('٤ — التواصل والتذكير','إذا كان للعقد رقم جوال تظهر أزرار 📞 للاتصال و💬 لفتح واتساب بجانب كل عقد، وداخل صفحة العقد زر «تذكير واتساب» يفتح المحادثة برسالة جاهزة فيها المبلغ المتأخر أو القسط القادم وتاريخه. وإن لم يكن للعقد رقم، أضفه من داخل صفحة العقد مباشرة.')+
  g('٥ — الاستيراد من إيجار','من «الاستيراد والنسخ»: افتح بوابة إيجار، ظلّل جدول العقود وانسخه، ثم الصقه في المربع الأول واضغط «تحليل النص». سيخمّن التطبيق كل عمود (المستأجر، رقم العقد، القيمة، التواريخ...) — راجع التعيين وصحّح ما يلزم من القوائم أعلى الأعمدة، ثم «استيراد العقود».')+
  g('٦ — مطابقة كشف البنك','للتحويلات البنكية: انسخ التحويلات الواردة من كشف حسابك والصقها في مربع «مطابقة كشف البنك». سيقترح التطبيق المستأجر المناسب لكل تحويل من الاسم الوارد في البيان أو من تطابق المبلغ مع قسط مستحق، وتستطيع تغيير الاقتراح أو تجاهل أي سطر، ثم «تسجيل الدفعات المحددة» فتُسجَّل كلها دفعة واحدة بقناة «تحويل بنكي».')+
  g('٧ — لوحة المتابعة والتقارير','اللوحة تعرض المتأخرات (الأعلى أولاً)، الأقساط القادمة خلال ٣٠ يوماً، والعقود التي تنتهي خلال ٩٠ يوماً حتى تجددها مبكراً. وصفحة «التقارير» فيها ملخص السنة، رسم التحصيل الشهري لآخر ١٢ شهراً، أداء كل عقار، والوحدات الشاغرة مع الفاقد التقديري الشهري.')+
  g('٨ — أرشفة العقود المنتهية','بعد انتهاء العقد وتسوية حسابه افتحه واضغط «أرشفة» — يختفي من القوائم والإحصائيات لكن يبقى تاريخه محفوظاً، وتصل إليه في أي وقت من تصفية «المؤرشفة» في صفحة العقود، ومنها تستطيع «إلغاء الأرشفة».')+
  g('٩ — النسخ الاحتياطي (مهم جداً)','بياناتك محفوظة داخل متصفح هذا الجهاز فقط ولا تُرفع لأي جهة. لذلك صدّر نسخة احتياطية (ملف JSON صغير) مرة شهرياً على الأقل واحفظها في iCloud أو أرسلها لنفسك. سيذكّرك التطبيق تلقائياً إذا مرّ أكثر من ٣٠ يوماً. وعند تغيير الجهاز أو مسح بيانات المتصفح، استخدم «استعادة نسخة احتياطية» لإرجاع كل شيء.')+
  g('١٠ — إضافة التطبيق للشاشة الرئيسية','من Safari في الآيفون: افتح رابط التطبيق ← زر المشاركة ← «إضافة إلى الصفحة الرئيسية». يصبح أيقونة مستقلة تفتح بشاشة كاملة. ملاحظة: بيانات كل جهاز مستقلة، فلنقلها لجهاز آخر استخدم التصدير والاستعادة.');
}

/* ============ Demo data ============ */
function demoData(){
  var t=todayISO(),p1=uid(),p2=uid();
  var u=[uid(),uid(),uid(),uid(),uid(),uid()];
  function mk(unitId,tenant,phone,off,total,fm,count,pp,ch){
    var start=addMonths(t,off);var insts=[];
    for(var i=0;i<count;i++)insts.push({id:uid(),due:addMonths(start,i*fm),amount:total/count});
    var c={id:uid(),unitId:unitId,tenant:tenant,phone:phone,ejarRef:String(1000000000+Math.floor(Math.random()*9e8)),channel:ch,start:start,end:addMonths(start,fm*count),installments:insts,archived:false,notes:[]};
    var pays=pp>0?[{id:uid(),contractId:c.id,date:start,amount:total*pp,channel:ch,note:''}]:[];
    return {c:c,p:pays};
  }
  var a=mk(u[0],'محمد العتيبي','0501234567',-8,36000,3,4,0.5,'إيجار'),
      b=mk(u[1],'سعود الدوسري','0559876543',-4,24000,1,12,0.32,'تحويل بنكي'),
      d=mk(u[2],'شركة النخبة للتقنية','0533334444',-2,60000,6,2,0.5,'إيجار'),
      e=mk(u[3],'فهد القحطاني','0561112222',-11,30000,12,1,0,'تحويل بنكي');
  return {properties:[{id:p1,name:'برج الياسمين'},{id:p2,name:'عمارة الروضة'}],
    units:[{id:u[0],propertyId:p1,name:'شقة 101'},{id:u[1],propertyId:p1,name:'شقة 102'},{id:u[2],propertyId:p1,name:'معرض 1'},
           {id:u[3],propertyId:p2,name:'شقة 201'},{id:u[4],propertyId:p2,name:'شقة 202'},{id:u[5],propertyId:p2,name:'شقة 203'}],
    contracts:[a.c,b.c,d.c,e.c],payments:[].concat(a.p,b.p,d.p,e.p),meta:{lastBackup:null}};
}

  return h;
}

  setSort:function(v){UI.sort=v;renderCList()},

  closeModal:function(){UI.modal=null;UI.draft=[];renderModal()},
  openDetail:function(id){UI.modal={type:'detail',id:id};renderModal()},
  openForm:function(){UI.modal={type:'form',contract:null};UI.draft=[];renderModal()},
  editContract:function(id){var c=S.contracts.find(function(x){return x.id===id});UI.modal={type:'form',contract:c};UI.draft=(c.installments||[]).map(function(i){return {id:i.id,due:i.due,amount:i.amount}});renderModal()},
  formProp:function(pid){var c=UI.modal.contract;var d=UI.draft;UI.modal={type:'form',contract:c,pid:pid};renderModal();UI.draft=d;document.getElementById('f-insts').innerHTML=instsTableHTML()},
  genInsts:function(){
    var total=parseAmt(document.getElementById('f-total').value);
    var months=parseInt(document.getElementById('f-months').value)||12;
    var start=document.getElementById('f-start').value;
    if(!total||!start){alert('أدخل قيمة العقد وتاريخ البداية أولاً');return}
    var fid=document.getElementById('f-freq').value;
    var fm=FREQS.find(function(x){return x.id===fid}).m;
    var count=Math.max(1,Math.round(months/fm));
    var amt=Math.round(total/count*100)/100;
    UI.draft=[];
    for(var i=0;i<count;i++)UI.draft.push({id:uid(),due:addMonths(start,i*fm),amount:i===count-1?Math.round((total-amt*(count-1))*100)/100:amt});
    document.getElementById('f-insts').innerHTML=instsTableHTML();
  },
  instDue:function(id,v){var i=UI.draft.find(function(x){return x.id===id});if(i)i.due=v},
  instAmt:function(id,v){var i=UI.draft.find(function(x){return x.id===id});if(i)i.amount=parseAmt(v)||0},
  instDel:function(id){UI.draft=UI.draft.filter(function(x){return x.id!==id});document.getElementById('f-insts').innerHTML=instsTableHTML()},
  saveContract:function(){
    var pid=document.getElementById('f-prop').value;
    var newProp=document.getElementById('f-newprop').value.trim();
    var unitId=document.getElementById('f-unit').value;
    var newUnit=document.getElementById('f-newunit').value.trim();
    var tenant=document.getElementById('f-tenant').value.trim();
    if(newProp){pid=uid();S.properties.push({id:pid,name:newProp})}
    if(!pid){alert('اختر العقار أو أضف عقاراً جديداً');return}
    if(newUnit){unitId=uid();S.units.push({id:unitId,propertyId:pid,name:newUnit})}
    if(!unitId){alert('اختر الوحدة أو أضف وحدة جديدة');return}
    if(!tenant){alert('أدخل اسم المستأجر');return}
    if(!UI.draft.length){alert('ولّد جدول الأقساط أولاً');return}
    var start=document.getElementById('f-start').value;
    var months=parseInt(document.getElementById('f-months').value)||12;
    var old=UI.modal.contract;
    var c={id:old?old.id:uid(),unitId:unitId,tenant:tenant,
      phone:document.getElementById('f-phone').value.trim(),
      ejarRef:document.getElementById('f-ejar').value.trim(),
      channel:document.getElementById('f-channel').value,
      start:start,end:addMonths(start,months),
      installments:UI.draft.map(function(i){return {id:i.id,due:i.due,amount:i.amount}}),
      archived:old?!!old.archived:false,notes:old?(old.notes||[]):[]};
    if(old)S.contracts=S.contracts.map(function(x){return x.id===old.id?c:x});else S.contracts.push(c);
    save();UI.modal=null;UI.draft=[];renderModal();renderApp();
  },
  delContract:function(id){
    if(!confirm('حذف العقد وجميع دفعاته نهائياً؟ (للاحتفاظ بالتاريخ استخدم الأرشفة بدلاً من الحذف)'))return;
    S.contracts=S.contracts.filter(function(x){return x.id!==id});
    S.payments=S.payments.filter(function(p){return p.contractId!==id});
    save();UI.modal=null;renderModal();renderApp();
  },
  archive:function(id){
    if(!confirm('سيُخفى العقد من القوائم والتقارير ويبقى محفوظاً مع كامل تاريخه. متابعة؟'))return;
    var c=S.contracts.find(function(x){return x.id===id});if(c)c.archived=true;
    save();renderModal();renderApp();
  },
  unarchive:function(id){
    var c=S.contracts.find(function(x){return x.id===id});if(c)c.archived=false;
    save();renderModal();renderApp();
  },
  savePhone:function(id){
    var v=document.getElementById('add-phone').value.trim();
    if(!v){alert('أدخل الرقم أولاً');return}
    var c=S.contracts.find(function(x){return x.id===id});if(c)c.phone=v;
    save();renderModal();renderApp();
  },
  addNote:function(id){
    var v=document.getElementById('note-text').value.trim();
    if(!v)return;
    var c=S.contracts.find(function(x){return x.id===id});
    if(c){if(!c.notes)c.notes=[];c.notes.push({id:uid(),date:todayISO(),text:v})}
    save();renderModal();
  },
  delNote:function(cid,nid){
    var c=S.contracts.find(function(x){return x.id===cid});
    if(c)c.notes=(c.notes||[]).filter(function(n){return n.id!==nid});
    save();renderModal();
  },
  addPayment:function(cid){
    var amt=parseAmt(document.getElementById('p-amount').value);
    if(!amt||amt<=0){alert('أدخل مبلغاً صحيحاً');return}
    S.payments.push({id:uid(),contractId:cid,date:document.getElementById('p-date').value||todayISO(),amount:amt,
      channel:document.getElementById('p-channel').value,note:document.getElementById('p-note').value.trim()});
    save();renderModal();renderApp();
  },
  delPayment:function(pid){
    if(!confirm('حذف هذه الدفعة؟'))return;
    S.payments=S.payments.filter(function(x){return x.id!==pid});
    save();renderModal();renderApp();
  },
  addProp:function(){var v=document.getElementById('np').value.trim();if(!v)return;S.properties.push({id:uid(),name:v});save();renderApp()},
  delProp:function(id){
    if(S.units.some(function(u){return u.propertyId===id})){alert('احذف وحدات العقار أولاً');return}
    if(!confirm('حذف هذا العقار؟'))return;
    S.properties=S.properties.filter(function(x){return x.id!==id});save();renderApp();
  },
  addUnits:function(pid){
    var v=document.getElementById('nu-'+pid).value;
    var names=v.split(/[,،]/).map(function(s){return s.trim()}).filter(Boolean);
    if(!names.length)return;
    names.forEach(function(n){S.units.push({id:uid(),propertyId:pid,name:n})});
    save();renderApp();
  },
  delUnit:function(id){
    if(S.contracts.some(function(c){return c.unitId===id})){alert('الوحدة مرتبطة بعقد');return}
    if(!confirm('حذف هذه الوحدة؟'))return;
    S.units=S.units.filter(function(x){return x.id!==id});save();renderApp();
  },
  parseImp:function(){
    var parsed=splitRows(document.getElementById('imp-text').value);
    if(!parsed)return;
    var nCols=parsed[0].length;
    var headerWords=/مستأجر|عقد|وحدة|عقار|قيمة|تاريخ|بداية|نهاية|جوال|اسم/;
    var header=null;
    if(headerWords.test(parsed[0].join(' '))&&!parsed[0].some(function(x){return parseDateLoose(x)})){header=parsed[0];parsed=parsed.slice(1)}
    var map=[];
    for(var ci=0;ci<nCols;ci++){
      var g=null;
      if(header){var hh=header[ci]||'';
        if(/مستأجر|اسم/.test(hh))g='tenant';else if(/رقم.*عقد|عقد.*رقم/.test(hh))g='ejarRef';
        else if(/عقار|مبنى|برج/.test(hh))g='property';else if(/وحدة|شقة|محل/.test(hh))g='unit';
        else if(/بداية/.test(hh))g='start';else if(/نهاية|انتهاء/.test(hh))g='end';
        else if(/قيمة|إيجار|مبلغ/.test(hh))g='total';else if(/جوال|هاتف/.test(hh))g='phone';}
      if(!g)g=guessCol(parsed.slice(0,8).map(function(r){return r[ci]}));
      map.push(g);
    }
    var di=[];map.forEach(function(x,i){if(x==='start')di.push(i)});
    if(di.length>=2)map[di[1]]='end';
    map=dedupeMap(map);
    UI.imp={rows:parsed,map:map};
    renderImpPrev();
  },
  setMap:function(ci,v){UI.imp.map[ci]=v;renderImpPrev()},
  cancelImp:function(){UI.imp=null;renderImpPrev()},
  doImport:function(){
    var map=UI.imp.map,rows=UI.imp.rows;
    function idx(k){return map.indexOf(k)}
    function get(r,k){var i=idx(k);return i>=0?r[i]:''}
    var fid=document.getElementById('imp-freq').value;
    var fm=FREQS.find(function(x){return x.id===fid}).m;
    var defProp=document.getElementById('imp-defprop').value.trim();
    var ok=0,skipped=0;
    var propByName={};S.properties.forEach(function(p){propByName[p.name]=p.id});
    rows.forEach(function(r){
      var tenant=get(r,'tenant'),total=parseAmt(get(r,'total'));
      var start=parseDateLoose(get(r,'start'))||todayISO();
      if(!tenant||!total){skipped++;return}
      var end=parseDateLoose(get(r,'end'))||addMonths(start,12);
      var propName=get(r,'property')||defProp||'عقار مستورد';
      var pid=propByName[propName];
      if(!pid){pid=uid();propByName[propName]=pid;S.properties.push({id:pid,name:propName})}
      var unitNm=get(r,'unit')||('وحدة '+(ok+1));
      var unit=S.units.find(function(u){return u.propertyId===pid&&u.name===unitNm});
      var uidd=unit?unit.id:null;
      if(!uidd){uidd=uid();S.units.push({id:uidd,propertyId:pid,name:unitNm})}
      var months=Math.max(1,Math.round(daysBetween(start,end)/30.44));
      var count=Math.max(1,Math.round(months/fm));
      var amt=Math.round(total/count*100)/100;
      var insts=[];
      for(var i=0;i<count;i++)insts.push({id:uid(),due:addMonths(start,i*fm),amount:i===count-1?Math.round((total-amt*(count-1))*100)/100:amt});
      S.contracts.push({id:uid(),unitId:uidd,tenant:tenant,phone:get(r,'phone'),ejarRef:get(r,'ejarRef'),channel:'إيجار',start:start,end:end,installments:insts,archived:false,notes:[]});
      ok++;
    });
    if(!ok){alert('لم يتم التعرف على أي صف صالح. تأكد من تحديد أعمدة المستأجر وقيمة العقد.');return}
    save();UI.imp=null;
    alert('تم استيراد '+ok+' عقد'+(skipped?' — وتجاهُل '+skipped+' صف غير مكتمل':'')+'.');
    UI.view='contracts';renderApp();
  },
  parseBank:function(){
    var parsed=splitRows(document.getElementById('bank-text').value);
    if(!parsed)return;
    var nCols=parsed[0].length;
    var headerWords=/تاريخ|date|مبلغ|amount|دائن|credit|وارد|البيان|الوصف|تفاصيل|narration|details|رصيد|balance|مدين|debit/i;
    var header=null;
    if(headerWords.test(parsed[0].join(' '))&&!parsed[0].some(function(x){return parseDateLoose(x)})){header=parsed[0];parsed=parsed.slice(1)}
    var g=[];
    for(var ci=0;ci<nCols;ci++){
      var col=null;
      if(header){var hh=header[ci]||'';
        if(/تاريخ|date/i.test(hh))col='date';
        else if(/رصيد|balance|مدين|debit/i.test(hh))col='skip';
        else if(/دائن|credit|وارد|مبلغ|amount/i.test(hh))col='amount';
        else if(/البيان|الوصف|تفاصيل|narration|details/i.test(hh))col='desc';}
      if(!col){
        var vals=parsed.slice(0,8).map(function(r){return r[ci]}).filter(Boolean);
        if(vals.length&&vals.every(function(x){return parseDateLoose(x)}))col='date';
        else if(vals.length&&vals.every(function(x){return parseAmt(x)!==null}))col='amount';
        else if(vals.some(function(x){return String(x).length>=6}))col='desc';
        else col='skip';
      }
      g.push(col);
    }
    var seenDate=false,descLens=[];
    g=g.map(function(x,i){
      if(x==='date'){if(seenDate)return 'skip';seenDate=true;return x}
      return x;
    });
    var amtIdx=[];g.forEach(function(x,i){if(x==='amount')amtIdx.push(i)});
    if(amtIdx.length>1)amtIdx.slice(1).forEach(function(i){g[i]='skip'});
    var descIdx=[];g.forEach(function(x,i){if(x==='desc')descIdx.push(i)});
    if(descIdx.length>1){
      var best=descIdx[0],bl=0;
      descIdx.forEach(function(i){var L=0;parsed.slice(0,8).forEach(function(r){L+=String(r[i]||'').length});if(L>bl){bl=L;best=i}});
      descIdx.forEach(function(i){if(i!==best)g[i]='skip'});
    }
    UI.bank={rows:parsed,map:g};
    renderBankPrev();
  },
  setBankMap:function(ci,v){UI.bank.map[ci]=v;renderBankPrev()},
  cancelBank:function(){UI.bank=null;renderBankPrev()},
  doBank:function(){
    if(!UI.bank||!UI.bank.matches)return;
    var ok=0,dup=0;
    UI.bank.matches.forEach(function(m,i){
      var sel=document.getElementById('bk-'+i);
      var cid=sel?sel.value:'';
      if(!cid)return;
      var exists=S.payments.some(function(p){return p.contractId===cid&&p.date===m.date&&Math.abs(p.amount-m.amount)<0.01});
      if(exists){dup++;return}
      S.payments.push({id:uid(),contractId:cid,date:m.date,amount:m.amount,channel:'تحويل بنكي',note:(m.desc||'').slice(0,60)});
      ok++;
    });
    save();UI.bank=null;
    alert(ok?('تم تسجيل '+ok+' دفعة من كشف البنك'+(dup?' — وتجاهُل '+dup+' دفعة مكررة':'')+'.'):(dup?'كل التحويلات المحددة مسجلة مسبقاً.':'لم تحدد أي تحويل.'));
    renderApp();
  },
  exportJSON:function(){
    S.meta.lastBackup=todayISO();save();
    var blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download='rent-backup-'+todayISO()+'.json';document.body.appendChild(a);a.click();a.remove();
    renderApp();
  },
  restore:function(inp){
    var file=inp.files&&inp.files[0];if(!file)return;
    var rd=new FileReader();
    rd.onload=function(){
      try{var d=JSON.parse(rd.result);
        if(d&&Array.isArray(d.contracts)){
          if(confirm('سيتم استبدال البيانات الحالية بالنسخة الاحتياطية. متابعة؟')){
            S=d;if(!S.meta)S.meta={lastBackup:null};if(!S.payments)S.payments=[];
            S.contracts.forEach(function(c){if(c.archived===undefined)c.archived=false;if(!c.notes)c.notes=[]});
            save();renderApp();
          }
        }
        else alert('ملف غير صالح');
      }catch(e){alert('ملف غير صالح')}
    };
    rd.readAsText(file);inp.value='';
  }
};

load();renderApp();
</script>
