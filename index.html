<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="سجل التحصيل">
<meta name="theme-color" content="#0E5A48">
<title>سجل التحصيل العقاري</title>
<style>
*{box-sizing:border-box;margin:0}
:root{--bg:#F3F5F2;--paper:#FFF;--ink:#17221E;--mut:#5B6663;--line:#DEE4E0;--green:#0E5A48;--green2:#0B463A;--gold:#9A6A0B;--red:#A8362C}
body{font-family:-apple-system,'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--ink);direction:rtl}
.num{font-variant-numeric:tabular-nums}
header{background:var(--green);color:#fff;padding:max(14px,env(safe-area-inset-top)) 20px 12px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
header h1{font-size:19px;font-weight:800;letter-spacing:.2px}
header .sub{font-size:12px;opacity:.85}
nav{display:flex;gap:4px;background:var(--green2);padding:6px 14px;overflow-x:auto;position:sticky;top:0;z-index:10}
nav button{border:0;background:transparent;color:#CFE3DC;padding:9px 16px;border-radius:9px;font:inherit;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap}
nav button.on{background:#fff;color:var(--green2)}
main{max-width:1080px;margin:0 auto;padding:18px 14px 80px}
.card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:16px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:14px}
.kpi .t{font-size:12px;color:var(--mut);font-weight:700}
.kpi .v{font-size:22px;font-weight:800;margin-top:4px}
.kpi .u{font-size:11px;color:var(--mut)}
.sec{font-size:15px;font-weight:800;margin:18px 0 8px;display:flex;align-items:center;gap:8px}
.sec::after{content:"";flex:1;height:1px;background:var(--line)}
.chip{display:inline-block;padding:2px 10px;border-radius:99px;font-size:11.5px;font-weight:800}
.btn{border:0;border-radius:10px;padding:9px 16px;font:inherit;font-size:13.5px;font-weight:800;cursor:pointer;background:var(--green);color:#fff}
.btn.sec2{background:#E8EDE9;color:var(--green2)}
.btn.dng{background:#F9E5E2;color:var(--red)}
.btn.sm{padding:6px 11px;font-size:12.5px;border-radius:8px}
.in{width:100%;border:1px solid var(--line);border-radius:10px;padding:9px 11px;font:inherit;font-size:13.5px;background:#fff;color:var(--ink)}
.in:focus{outline:2px solid var(--green);border-color:var(--green)}
.lbl{font-size:12px;font-weight:800;color:var(--mut);display:block;margin:0 0 4px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px}
.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ribbon{display:flex;gap:3px;height:10px;border-radius:6px;overflow:hidden;flex:1;min-width:120px}
.ribbon i{display:block;height:100%;min-width:6px;border-radius:3px}
.clist .item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--line);cursor:pointer;flex-wrap:wrap}
.clist .item:active{background:#F2F7F4}
.clist .item:last-child{border-bottom:0}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:right;color:var(--mut);font-size:11.5px;padding:7px 8px;border-bottom:1px solid var(--line)}
.tbl td{padding:8px;border-bottom:1px solid #EDF0EE}
.modal-bg{position:fixed;inset:0;background:rgba(15,30,25,.45);display:flex;align-items:flex-start;justify-content:center;padding:24px 12px;z-index:50;overflow:auto}
.modal{background:#fff;border-radius:16px;max-width:680px;width:100%;padding:20px;margin-bottom:40px}
.modal h3{font-size:16px;font-weight:800;margin-bottom:14px}
.empty{text-align:center;padding:46px 16px;color:var(--mut)}
.empty b{display:block;font-size:16px;color:var(--ink);margin-bottom:6px}
.pbar{height:7px;background:#E8EDE9;border-radius:5px;overflow:hidden}
.pbar i{display:block;height:100%;background:var(--green)}
.tag{font-size:11px;font-weight:800;color:var(--mut);background:#EDF0EE;border-radius:6px;padding:2px 8px}
textarea.in{font-family:ui-monospace,monospace;font-size:12px;direction:ltr;text-align:right}
@media(max-width:640px){.grid2{grid-template-columns:1fr}.kpi .v{font-size:18px}}
</style>
</head>
<body>
<div id="app"></div>
<div id="modal"></div>
<script>
/* ============ Helpers ============ */
var KEY='rent-tracker-v1';
function uid(){return Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4)}
function todayISO(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function fmtM(n){return new Intl.NumberFormat('en-US',{maximumFractionDigits:0}).format(Math.round(n||0))}
function fmtD(s){if(!s)return'—';var p=s.split('-');return p[2]+'/'+p[1]+'/'+p[0]}
function addMonths(iso,n){var p=iso.split('-').map(Number);var dt=new Date(Date.UTC(p[0],p[1]-1+n,1));var last=new Date(Date.UTC(dt.getUTCFullYear(),dt.getUTCMonth()+1,0)).getUTCDate();dt.setUTCDate(Math.min(p[2],last));return dt.toISOString().slice(0,10)}
function daysBetween(a,b){return Math.round((new Date(b)-new Date(a))/86400000)}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function parseDateLoose(s){if(!s)return null;s=String(s).trim();var m=s.match(/^(\d{4})[-\/.](\d{1,2})[-\/.](\d{1,2})/);if(m)return m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0');m=s.match(/^(\d{1,2})[-\/.](\d{1,2})[-\/.](\d{4})/);if(m)return m[3]+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0');return null}
function parseAmt(s){if(s==null)return null;var t=String(s).replace(/[,٬\s]/g,'').replace(/ر\.?س|SAR|ريال/gi,'');var n=parseFloat(t);return isNaN(n)?null:n}

var FREQS=[{id:'monthly',label:'شهري',m:1},{id:'quarterly',label:'ربع سنوي',m:3},{id:'semi',label:'نصف سنوي',m:6},{id:'annual',label:'سنوي',m:12}];
var CHANNELS=['إيجار','تحويل بنكي','نقدي','شيك'];
var STATUS={paid:{label:'مسدد',c:'#0F6E52',bg:'#E2F2EB'},partial:{label:'سداد جزئي',c:'#9A6A0B',bg:'#F8EED7'},overdue:{label:'متأخر',c:'#A8362C',bg:'#F9E5E2'},upcoming:{label:'قادم',c:'#5B6663',bg:'#EDF0EE'}};

/* ============ State ============ */
var S={properties:[],units:[],contracts:[],payments:[]};
var UI={view:'dash',q:'',prop:'',status:'',modal:null,draft:[],imp:null};

function load(){try{var r=localStorage.getItem(KEY);if(r)S=JSON.parse(r)}catch(e){}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(S))}catch(e){alert('تعذر حفظ البيانات — قد تكون مساحة المتصفح ممتلئة أو وضع التصفح الخاص مفعّلاً.')}}

/* ============ Compute ============ */
function computeContract(c){
  var pays=S.payments.filter(function(p){return p.contractId===c.id}).sort(function(a,b){return a.date<b.date?-1:1});
  var totalPaid=pays.reduce(function(s,p){return s+p.amount},0);
  var pool=totalPaid,t=todayISO();
  var inst=(c.installments||[]).slice().sort(function(a,b){return a.due<b.due?-1:1}).map(function(i){
    var paid=Math.min(pool,i.amount);pool-=paid;
    var st; if(paid>=i.amount-0.01)st='paid'; else if(i.due<=t)st=paid>0?'partial':'overdue'; else st='upcoming';
    return {id:i.id,due:i.due,amount:i.amount,paid:paid,remaining:Math.max(0,i.amount-paid),status:st};
  });
  var totalRent=inst.reduce(function(s,i){return s+i.amount},0);
  var arrears=inst.filter(function(i){return i.due<=t}).reduce(function(s,i){return s+i.remaining},0);
  var next=null;for(var k=0;k<inst.length;k++){if(inst[k].status!=='paid'){next=inst[k];break}}
  var dueSoon=inst.filter(function(i){return i.status==='upcoming'&&daysBetween(t,i.due)<=30});
  return {inst:inst,pays:pays,totalPaid:totalPaid,totalRent:totalRent,arrears:arrears,next:next,dueSoon:dueSoon,credit:pool,expired:c.end&&c.end<t};
}
function unitName(id){var u=S.units.find(function(x){return x.id===id});var p=u&&S.properties.find(function(x){return x.id===u.propertyId});return u?((p?p.name:'')+' — '+u.name):'—'}

/* ============ Render: pieces ============ */
function ribbonHTML(inst){
  return '<div class="ribbon">'+inst.map(function(i){
    var col=i.status==='paid'?'#0F6E52':i.status==='partial'?'#D9A437':i.status==='overdue'?'#C2483D':'#CBD4CF';
    return '<i style="flex:'+i.amount+';background:'+col+'" title="'+fmtD(i.due)+' — '+fmtM(i.amount)+' ر.س — '+STATUS[i.status].label+'"></i>';
  }).join('')+'</div>';
}
function chipHTML(s){return '<span class="chip" style="color:'+STATUS[s].c+';background:'+STATUS[s].bg+'">'+STATUS[s].label+'</span>'}
function kpi(t,v,u,color){return '<div class="card kpi"><div class="t">'+t+'</div><div class="v num"'+(color?' style="color:'+color+'"':'')+'>'+v+'</div><div class="u num">'+u+'</div></div>'}

/* ============ Render: views ============ */
function renderApp(){
  var comp=S.contracts.map(function(c){return Object.assign({c:c},computeContract(c))});
  var tot={rent:0,paid:0,arr:0,due30:0,odc:0};
  comp.forEach(function(x){tot.rent+=x.totalRent;tot.paid+=Math.min(x.totalPaid,x.totalRent);tot.arr+=x.arrears;tot.due30+=x.dueSoon.reduce(function(s,i){return s+i.amount},0);if(x.arrears>0.01)tot.odc++});
  var empty=!S.properties.length&&!S.contracts.length;

  var h='<header><div><h1>سجل التحصيل العقاري</h1><div class="sub num">'+S.properties.length+' عقار · '+S.units.length+' وحدة · '+S.contracts.length+' عقد</div></div></header>';
  h+='<nav>'+[['dash','لوحة المتابعة'],['contracts','العقود والدفعات'],['props','العقارات والوحدات'],['import','الاستيراد والنسخ']].map(function(t){
    return '<button class="'+(UI.view===t[0]?'on':'')+'" onclick="A.nav(\''+t[0]+'\')">'+t[1]+'</button>';
  }).join('')+'</nav><main>';

  if(empty&&UI.view!=='import'){
    h+='<div class="card empty"><b>ابدأ بإضافة بياناتك</b>أضف عقاراتك ووحداتك وعقودك يدوياً، أو الصق بياناتك من منصة إيجار في صفحة الاستيراد.'+
       '<div class="row" style="justify-content:center;margin-top:16px"><button class="btn" onclick="A.openForm()">إضافة عقد</button>'+
       '<button class="btn sec2" onclick="A.nav(\'import\')">الاستيراد من إيجار</button>'+
       '<button class="btn sec2" onclick="A.demo()">تجربة ببيانات توضيحية</button></div></div>';
  }
  else if(UI.view==='dash'){
    h+='<div class="kpis">'+kpi('إجمالي قيمة العقود',fmtM(tot.rent),'ر.س')+
       kpi('المحصل',fmtM(tot.paid),'ر.س — '+(tot.rent?Math.round(tot.paid/tot.rent*100):0)+'٪','#0F6E52')+
       kpi('المتأخرات المتراكمة',fmtM(tot.arr),'ر.س — '+tot.odc+' عقد',tot.arr>0?'#A8362C':'#0F6E52')+
       kpi('مستحق خلال ٣٠ يوماً',fmtM(tot.due30),'ر.س','#9A6A0B')+'</div>';
    h+='<div class="sec">المتأخرات — الأعلى أولاً</div><div class="card clist" style="padding:0">';
    var od=comp.filter(function(x){return x.arrears>0.01}).sort(function(a,b){return b.arrears-a.arrears}).slice(0,20);
    if(od.length){h+=od.map(function(x){
      return '<div class="item" onclick="A.openDetail(\''+x.c.id+'\')"><div style="min-width:165px"><div style="font-weight:800;font-size:14px">'+esc(x.c.tenant)+'</div>'+
        '<div style="font-size:12px;color:var(--mut)">'+esc(unitName(x.c.unitId))+'</div></div>'+ribbonHTML(x.inst)+
        '<div class="num" style="font-weight:800;color:#A8362C;min-width:90px;text-align:left">'+fmtM(x.arrears)+' ر.س</div></div>';
    }).join('')}else h+='<div class="empty" style="padding:24px">لا توجد متأخرات — جميع الأقساط المستحقة مسددة ✓</div>';
    h+='</div>';
    h+='<div class="sec">أقساط قادمة خلال ٣٠ يوماً</div><div class="card clist" style="padding:0">';
    var ds=[];comp.forEach(function(x){x.dueSoon.forEach(function(i){ds.push({x:x,i:i})})});
    ds.sort(function(a,b){return a.i.due<b.i.due?-1:1});
    if(ds.length){h+=ds.slice(0,20).map(function(o){
      return '<div class="item" onclick="A.openDetail(\''+o.x.c.id+'\')"><div style="min-width:165px"><div style="font-weight:800;font-size:14px">'+esc(o.x.c.tenant)+'</div>'+
        '<div style="font-size:12px;color:var(--mut)">'+esc(unitName(o.x.c.unitId))+'</div></div>'+
        '<span class="tag num">'+fmtD(o.i.due)+'</span><span class="tag">'+esc(o.x.c.channel)+'</span>'+
        '<div class="num" style="font-weight:800;min-width:90px;text-align:left">'+fmtM(o.i.amount)+' ر.س</div></div>';
    }).join('')}else h+='<div class="empty" style="padding:24px">لا توجد استحقاقات خلال ٣٠ يوماً القادمة</div>';
    h+='</div>';
  }
  else if(UI.view==='contracts'){
    h+='<div class="row" style="margin-bottom:12px">'+
      '<input class="in" style="flex:2;min-width:150px" placeholder="بحث: مستأجر / وحدة / رقم عقد" value="'+esc(UI.q)+'" oninput="A.setQ(this.value)">'+
      '<select class="in" style="flex:1;min-width:125px" onchange="A.setProp(this.value)"><option value="">كل العقارات</option>'+
      S.properties.map(function(p){return '<option value="'+p.id+'"'+(UI.prop===p.id?' selected':'')+'>'+esc(p.name)+'</option>'}).join('')+'</select>'+
      '<select class="in" style="flex:1;min-width:125px" onchange="A.setStatus(this.value)"><option value="">كل الحالات</option>'+
      '<option value="overdue"'+(UI.status==='overdue'?' selected':'')+'>عليه متأخرات</option>'+
      '<option value="due30"'+(UI.status==='due30'?' selected':'')+'>مستحق خلال ٣٠ يوم</option>'+
      '<option value="paid"'+(UI.status==='paid'?' selected':'')+'>مسدد بالكامل</option></select>'+
      '<button class="btn" onclick="A.openForm()">+ عقد جديد</button></div>'+
      '<div class="card clist" style="padding:0" id="clist"></div>';
  }
  else if(UI.view==='props'){
    h+='<div class="row" style="margin-bottom:12px"><input class="in" id="np" style="flex:1;max-width:280px" placeholder="اسم عقار جديد">'+
       '<button class="btn" onclick="A.addProp()">+ إضافة عقار</button></div>';
    if(!S.properties.length)h+='<div class="card empty"><b>لا توجد عقارات بعد</b>أضف أول عقار من الحقل أعلاه.</div>';
    S.properties.forEach(function(p){
      var units=S.units.filter(function(u){return u.propertyId===p.id});
      h+='<div class="card" style="margin-bottom:12px"><div class="row" style="justify-content:space-between">'+
        '<div style="font-weight:800;font-size:15px">'+esc(p.name)+' <span class="tag num">'+units.length+' وحدة</span></div>'+
        '<button class="btn dng sm" onclick="A.delProp(\''+p.id+'\')">حذف العقار</button></div><div class="row" style="margin-top:10px">'+
        units.map(function(u){
          var hasC=S.contracts.some(function(c){return c.unitId===u.id});
          return '<span class="tag" style="display:inline-flex;align-items:center;gap:6px;padding:5px 10px;background:'+(hasC?'#E2F2EB':'#EDF0EE')+';color:'+(hasC?'#0F6E52':'var(--mut)')+'">'+
            esc(u.name)+(hasC?' · مؤجرة':' · شاغرة')+
            (!hasC?'<button style="border:0;background:transparent;cursor:pointer;color:#A8362C;font-weight:800" onclick="A.delUnit(\''+u.id+'\')">✕</button>':'')+'</span>';
        }).join('')+'</div><div class="row" style="margin-top:10px">'+
        '<input class="in" id="nu-'+p.id+'" style="max-width:320px" placeholder="أسماء وحدات جديدة، افصل بفاصلة: 101, 102, 103">'+
        '<button class="btn sec2 sm" onclick="A.addUnits(\''+p.id+'\')">إضافة وحدات</button></div></div>';
    });
  }
  else if(UI.view==='import'){
    h+='<div class="card"><div class="sec" style="margin-top:0">الاستيراد من منصة إيجار (لصق مباشر)</div>'+
      '<p style="font-size:13px;color:var(--mut);margin-bottom:10px;line-height:1.8">افتح قائمة العقود في بوابة إيجار، ظلّل الجدول وانسخه ثم الصقه هنا. يمكنك أيضاً لصق محتوى CSV أو Excel. سيحلل التطبيق الأعمدة تلقائياً ويمكنك تصحيح التعيين قبل الاستيراد.</p>'+
      '<textarea class="in" id="imp-text" rows="6" placeholder="مثال:\nمحمد العتيبي\t1023456789\tبرج الياسمين\t101\t2026-01-01\t2026-12-31\t36000"></textarea>'+
      '<div class="row" style="margin-top:10px"><button class="btn" onclick="A.parseImp()">تحليل النص</button>'+
      '<span class="lbl" style="margin:0">جدولة الأقساط الافتراضية:</span>'+
      '<select class="in" id="imp-freq" style="width:130px">'+FREQS.map(function(f){return '<option value="'+f.id+'"'+(f.id==='annual'?' selected':'')+'>'+f.label+'</option>'}).join('')+'</select>'+
      '<input class="in" id="imp-defprop" style="width:180px" placeholder="اسم العقار الافتراضي"></div>'+
      '<div id="imp-prev"></div></div>'+
      '<div class="card" style="margin-top:14px"><div class="sec" style="margin-top:0">النسخ الاحتياطي</div>'+
      '<p style="font-size:13px;color:var(--mut);margin-bottom:10px">البيانات محفوظة داخل متصفح هذا الجهاز فقط. صدّر نسخة JSON بانتظام واحفظها في iCloud أو أرسلها لنفسك — وبها تستعيد كل شيء أو تنقله لجهاز آخر.</p>'+
      '<div class="row"><button class="btn sec2" onclick="A.exportJSON()">تصدير نسخة احتياطية</button>'+
      '<button class="btn sec2" onclick="document.getElementById(\'rest\').click()">استعادة نسخة احتياطية</button>'+
      '<input type="file" id="rest" accept=".json,application/json" style="display:none" onchange="A.restore(this)"></div></div>';
  }
  h+='</main>';
  document.getElementById('app').innerHTML=h;
  if(UI.view==='contracts')renderCList();
}

function renderCList(){
  var el=document.getElementById('clist');if(!el)return;
  var list=S.contracts.map(function(c){return Object.assign({c:c},computeContract(c))}).filter(function(x){
    var u=S.units.find(function(un){return un.id===x.c.unitId});
    if(UI.prop&&(!u||u.propertyId!==UI.prop))return false;
    if(UI.q){var q=UI.q;if(!(x.c.tenant.indexOf(q)>=0||(u&&u.name.indexOf(q)>=0)||(x.c.ejarRef||'').indexOf(q)>=0))return false}
    if(UI.status==='overdue'&&x.arrears<=0.01)return false;
    if(UI.status==='due30'&&!x.dueSoon.length)return false;
    if(UI.status==='paid'&&(x.arrears>0.01||x.totalPaid<x.totalRent-0.01))return false;
    return true;
  }).sort(function(a,b){return b.arrears-a.arrears});
  if(!list.length){el.innerHTML='<div class="empty" style="padding:24px">لا توجد عقود مطابقة للتصفية</div>';return}
  el.innerHTML=list.map(function(x){
    return '<div class="item" onclick="A.openDetail(\''+x.c.id+'\')"><div style="min-width:175px">'+
      '<div style="font-weight:800;font-size:14px">'+esc(x.c.tenant)+(x.expired?' <span class="tag">منتهٍ</span>':'')+'</div>'+
      '<div style="font-size:12px;color:var(--mut)">'+esc(unitName(x.c.unitId))+' · '+esc(x.c.channel)+'</div></div>'+ribbonHTML(x.inst)+
      '<div style="min-width:115px;text-align:left">'+
      (x.arrears>0.01?'<div class="num" style="font-weight:800;color:#A8362C;font-size:13.5px">متأخر '+fmtM(x.arrears)+' ر.س</div>'
                     :'<div class="num" style="font-weight:800;color:#0F6E52;font-size:13.5px">منتظم ✓</div>')+

/* ============ Import preview ============ */
var COLS=[{id:'skip',label:'تجاهل'},{id:'tenant',label:'المستأجر'},{id:'ejarRef',label:'رقم العقد'},{id:'property',label:'العقار'},{id:'unit',label:'الوحدة'},{id:'start',label:'تاريخ البداية'},{id:'end',label:'تاريخ النهاية'},{id:'total',label:'قيمة العقد'},{id:'phone',label:'الجوال'}];
function guessCol(vals){
  var v=vals.filter(Boolean).map(String);if(!v.length)return 'skip';
  if(v.every(function(x){return parseDateLoose(x)}))return 'start';
  if(v.every(function(x){var d=x.replace(/\D/g,'');return d.length>=9&&d.length<=12&&/^05/.test(d)}))return 'phone';
  if(v.every(function(x){return /^\d{9,}$/.test(x.replace(/\s/g,''))}))return 'ejarRef';
  if(v.every(function(x){var n=parseAmt(x);return /^[\d,٬.\s]+$/.test(x)&&n>500&&n<100000000}))return 'total';
  if(v.some(function(x){return /[\u0600-\u06FF]{3,}\s+[\u0600-\u06FF]{2,}/.test(x)}))return 'tenant';
  return 'skip';
}
function dedupeMap(map){
  var seenT=0,seenTotal=-1,seen={};
  map.forEach(function(x,i){if(x==='total')seenTotal=i});
  return map.map(function(x,i){
    if(x==='total')return i===seenTotal?'total':'skip';
    if(x==='tenant'){seenT++;return seenT===1?'tenant':seenT===2?'property':seenT===3?'unit':'skip'}
    if(x==='start'||x==='end'||x==='skip')return x;
    if(seen[x])return 'skip';seen[x]=1;return x;
  });
}

    if(!confirm('حذف هذه الوحدة؟'))return;

  },
  parseImp:function(){
    var text=document.getElementById('imp-text').value;
    var lines=text.split(/\r?\n/).map(function(l){return l.trim()}).filter(Boolean);
    if(!lines.length)return;
    var delim=lines[0].indexOf('\t')>=0?'\t':lines[0].indexOf(';')>=0?';':lines[0].indexOf(',')>=0?',':null;
    var parsed=lines.map(function(l){return (delim?l.split(delim):l.split(/\s{2,}/)).map(function(x){return x.trim()})});
    var nCols=Math.max.apply(null,parsed.map(function(r){return r.length}));
    parsed=parsed.map(function(r){while(r.length<nCols)r.push('');return r});
    var headerWords=/مستأجر|عقد|وحدة|عقار|قيمة|تاريخ|بداية|نهاية|جوال|اسم/;
    var header=null;
    if(headerWords.test(parsed[0].join(' '))&&!parsed[0].some(function(x){return parseDateLoose(x)})){header=parsed[0];parsed=parsed.slice(1)}
    var map=[];
    for(var ci=0;ci<nCols;ci++){
      var g=null;
      if(header){var hh=header[ci]||'';
        if(/مستأجر|اسم/.test(hh))g='tenant';else if(/رقم.*عقد|عقد.*رقم/.test(hh))g='ejarRef';
        else if(/عقار|مبنى|برج/.test(hh))g='property';else if(/وحدة|شقة|محل/.test(hh))g='unit';
        else if(/بداية/.test(hh))g='start';else if(/نهاية|انتهاء/.test(hh))g='end';
        else if(/قيمة|إيجار|مبلغ/.test(hh))g='total';else if(/جوال|هاتف/.test(hh))g='phone';}
      if(!g)g=guessCol(parsed.slice(0,8).map(function(r){return r[ci]}));
      map.push(g);
    }
    var di=[];map.forEach(function(x,i){if(x==='start')di.push(i)});
    if(di.length>=2)map[di[1]]='end';
    map=dedupeMap(map);
    UI.imp={rows:parsed,map:map};
    renderImpPrev();
  },
  setMap:function(ci,v){UI.imp.map[ci]=v;renderImpPrev()},
  cancelImp:function(){UI.imp=null;renderImpPrev()},
  doImport:function(){
    var map=UI.imp.map,rows=UI.imp.rows;
    function idx(k){return map.indexOf(k)}
    function get(r,k){var i=idx(k);return i>=0?r[i]:''}
    var fid=document.getElementById('imp-freq').value;
    var fm=FREQS.find(function(x){return x.id===fid}).m;
    var defProp=document.getElementById('imp-defprop').value.trim();
    var ok=0,skipped=0;
    var propByName={};S.properties.forEach(function(p){propByName[p.name]=p.id});
    rows.forEach(function(r){
      var tenant=get(r,'tenant'),total=parseAmt(get(r,'total'));
      var start=parseDateLoose(get(r,'start'))||todayISO();
      if(!tenant||!total){skipped++;return}
      var end=parseDateLoose(get(r,'end'))||addMonths(start,12);
      var propName=get(r,'property')||defProp||'عقار مستورد';
      var pid=propByName[propName];
      if(!pid){pid=uid();propByName[propName]=pid;S.properties.push({id:pid,name:propName})}
      var unitNm=get(r,'unit')||('وحدة '+(ok+1));
      var unit=S.units.find(function(u){return u.propertyId===pid&&u.name===unitNm});
      var uidd=unit?unit.id:null;
      if(!uidd){uidd=uid();S.units.push({id:uidd,propertyId:pid,name:unitNm})}
      var months=Math.max(1,Math.round(daysBetween(start,end)/30.44));
      var count=Math.max(1,Math.round(months/fm));
      var amt=Math.round(total/count*100)/100;
      var insts=[];
      for(var i=0;i<count;i++)insts.push({id:uid(),due:addMonths(start,i*fm),amount:i===count-1?Math.round((total-amt*(count-1))*100)/100:amt});
      S.contracts.push({id:uid(),unitId:uidd,tenant:tenant,phone:get(r,'phone'),ejarRef:get(r,'ejarRef'),channel:'إيجار',start:start,end:end,installments:insts});
      ok++;
    });
    if(!ok){alert('لم يتم التعرف على أي صف صالح. تأكد من تحديد أعمدة المستأجر وقيمة العقد.');return}
    save();UI.imp=null;
    alert('تم استيراد '+ok+' عقد'+(skipped?' — وتجاهُل '+skipped+' صف غير مكتمل':'')+'.');
    UI.view='contracts';renderApp();
  },
  exportJSON:function(){
    var blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download='rent-backup-'+todayISO()+'.json';document.body.appendChild(a);a.click();a.remove();
  },
  restore:function(inp){
    var file=inp.files&&inp.files[0];if(!file)return;
    var rd=new FileReader();
    rd.onload=function(){
      try{var d=JSON.parse(rd.result);
        if(d&&Array.isArray(d.contracts)){if(confirm('سيتم استبدال البيانات الحالية بالنسخة الاحتياطية. متابعة؟')){S=d;save();renderApp()}}
        else alert('ملف غير صالح');
      }catch(e){alert('ملف غير صالح')}
    };
    rd.readAsText(file);inp.value='';
  }
};

load();renderApp();
</script>
</body>
